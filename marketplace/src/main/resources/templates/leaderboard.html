<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Leaderboard — FreelanceHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/darkmode.css"/>
    <script src="/darkmode.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #F0F4F8; }
        .pro-nav { background: #0F172A; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 16px rgba(0,0,0,0.2); }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .nav-brand { color: white; font-weight: 800; font-size: 18px; text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-lnk { color: #94A3B8; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; transition: all 0.2s; }
        .nav-lnk:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-out { color: #F87171; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; }
        .nav-out:hover { background: rgba(248,113,113,0.1); }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); background: white; }
        .podium-card { border-radius: 18px; padding: 28px 16px; text-align: center; color: white; }
        .podium-name { font-weight: 700; font-size: 15px; margin: 8px 0 2px; }
        .podium-rating { font-size: 13px; opacity: 0.9; }
        .rank-row { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border-bottom: 1px solid #F1F5F9; transition: background 0.2s; }
        .rank-row:hover { background: #F8FAFC; }
        .rank-row:last-child { border-bottom: none; }
        .rank-num { font-size: 18px; font-weight: 700; width: 38px; text-align: center; flex-shrink: 0; color: #64748B; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg,#6366F1,#4F46E5); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; flex-shrink: 0; }
        .skill-tag { background: #EEF2FF; color: #6366F1; padding: 3px 10px; border-radius: 20px; font-size: 11px; display: inline-block; margin: 2px; }
        .rating-badge { background: #FEF3C7; color: #92400E; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .no-reviews { background: #F1F5F9; color: #94A3B8; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .table-header { padding: 12px 20px; font-weight: 700; color: #64748B; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #F1F5F9; }
    </style>
</head>
<body>
<nav class="pro-nav">
    <div class="container">
        <div class="nav-inner">
            <a href="/dashboard" class="nav-brand">🎓 FreelanceHub</a>
            <div class="nav-links">
                <a href="/dashboard" class="nav-lnk">🏠 Home</a>
                <a href="/messages"  class="nav-lnk">💬 Messages</a>
                <a href="/profile"   class="nav-lnk">👤 Profile</a>
                <a href="/settings"  class="nav-lnk">⚙️ Settings</a>
                <a href="/logout"    class="nav-out">🚪 Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5" style="max-width:820px;">
    <!-- ONLY ONE BACK BUTTON -->
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary mb-3">← Back</a>

    <h4 class="fw-bold mb-1">🏆 Freelancer Leaderboard</h4>
    <p class="text-muted mb-4">Ranked by average review rating from clients</p>

    <div th:if="${#lists.isEmpty(freelancers)}"
         class="card p-5 text-center text-muted">
        <div style="font-size:48px;">👥</div>
        <h5 class="mt-3 fw-bold">No freelancers yet</h5>
    </div>

    <!-- Podium Top 3 -->
    <div th:if="${!#lists.isEmpty(freelancers)}"
         class="row g-3 mb-4 align-items-end">
        <div class="col-4" th:if="${freelancers.size() >= 2}">
            <div class="podium-card"
                 style="background:linear-gradient(135deg,#94A3B8,#64748B);margin-top:28px;">
                <div style="font-size:36px;">🥈</div>
                <div class="podium-name" th:text="${freelancers[1].name}"></div>
                <div class="podium-rating"
                     th:with="r=${avgRatings[freelancers[1].id]},c=${reviewCounts[freelancers[1].id]}">
                    ⭐ <span th:text="${r > 0 ? r : 'No reviews'}"></span>
                    <span th:if="${c > 0}">
                        (<span th:text="${c}"></span>
                        <span th:text="${c == 1 ? 'review' : 'reviews'}"></span>)
                    </span>
                </div>
            </div>
        </div>
        <div class="col-4">
            <div class="podium-card"
                 style="background:linear-gradient(135deg,#F59E0B,#D97706);">
                <div style="font-size:44px;">🥇</div>
                <div class="podium-name" th:text="${freelancers[0].name}"></div>
                <div class="podium-rating"
                     th:with="r=${avgRatings[freelancers[0].id]},c=${reviewCounts[freelancers[0].id]}">
                    ⭐ <span th:text="${r > 0 ? r : 'No reviews'}"></span>
                    <span th:if="${c > 0}">
                        (<span th:text="${c}"></span>
                        <span th:text="${c == 1 ? 'review' : 'reviews'}"></span>)
                    </span>
                </div>
            </div>
        </div>
        <div class="col-4" th:if="${freelancers.size() >= 3}">
            <div class="podium-card"
                 style="background:linear-gradient(135deg,#CD7C2F,#A0522D);margin-top:40px;">
                <div style="font-size:28px;">🥉</div>
                <div class="podium-name" th:text="${freelancers[2].name}"></div>
                <div class="podium-rating"
                     th:with="r=${avgRatings[freelancers[2].id]},c=${reviewCounts[freelancers[2].id]}">
                    ⭐ <span th:text="${r > 0 ? r : 'No reviews'}"></span>
                    <span th:if="${c > 0}">
                        (<span th:text="${c}"></span>
                        <span th:text="${c == 1 ? 'review' : 'reviews'}"></span>)
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- Full Rankings -->
    <div class="card" th:if="${!#lists.isEmpty(freelancers)}">
        <div class="table-header">All Rankings — sorted by average rating</div>
        <div class="rank-row"
             th:each="f, stat : ${freelancers}"
             th:with="rating=${avgRatings[f.id]}, count=${reviewCounts[f.id]}">
            <div class="rank-num">
                <span th:if="${stat.index == 0}">🥇</span>
                <span th:if="${stat.index == 1}">🥈</span>
                <span th:if="${stat.index == 2}">🥉</span>
                <span th:if="${stat.index > 2}" th:text="${stat.count}"></span>
            </div>
            <div class="avatar" th:text="${#strings.substring(f.name,0,1)}"></div>
            <div class="flex-grow-1">
                <a th:href="@{/profile/{id}(id=${f.id})}"
                   th:text="${f.name}"
                   style="font-weight:700;color:#0F172A;text-decoration:none;font-size:15px;"></a>
                <br/>
                <span th:if="${f.skills != null and !#strings.isEmpty(f.skills)}"
                      th:each="skill : ${#strings.arraySplit(f.skills, ',')}"
                      class="skill-tag" th:text="${#strings.trim(skill)}"></span>
                <span th:if="${f.skills == null or #strings.isEmpty(f.skills)}"
                      class="text-muted small">No skills listed</span>
            </div>
            <div class="text-end">
                <div th:if="${count > 0}" class="mb-1">
                    <span class="rating-badge">⭐ <span th:text="${rating}"></span>/5</span>
                    <br/><small class="text-muted">
                    <span th:text="${count}"></span>
                    <span th:text="${count == 1 ? 'review' : 'reviews'}"></span>
                </small>
                </div>
                <div th:if="${count == 0}">
                    <span class="no-reviews">No reviews yet</span>
                </div>
                <div class="mt-1">
                    <a th:href="@{/profile/{id}(id=${f.id})}"
                       class="btn btn-sm btn-outline-secondary"
                       style="border-radius:8px;">View →</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
