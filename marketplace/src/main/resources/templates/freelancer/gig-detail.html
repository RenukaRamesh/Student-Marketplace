<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Project — FreelanceHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/darkmode.css"/>
    <script src="/darkmode.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #F0F4F8; }
        .pro-nav { background: #0F172A; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 16px rgba(0,0,0,0.2); }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .nav-brand { color: white; font-weight: 800; font-size: 18px; text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-lnk { color: #94A3B8; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; }
        .nav-lnk:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-out { color: #F87171; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; }
        .nav-out:hover { background: rgba(248,113,113,0.1); }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); background: white; padding: 28px; }
        .form-label { font-size: 12px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { border: 2px solid #E5E7EB; border-radius: 10px; padding: 11px 14px; font-size: 14px; background: #F9FAFB; }
        .form-control:focus { border-color: #6366F1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); background: white; }
        .btn-bid { background: #6366F1; border: none; color: white; border-radius: 10px; padding: 13px; font-weight: 700; width: 100%; font-size: 15px; }
        .btn-bid:hover { background: #4F46E5; color: white; }
    </style>
</head>
<body>
<nav class="pro-nav">
    <div class="container">
        <div class="nav-inner">
            <a href="/freelancer/dashboard" class="nav-brand">🎓 FreelanceHub</a>
            <div class="nav-links">
                <a href="/freelancer/dashboard" class="nav-lnk">🏠 Home</a>
                <a href="/messages"             class="nav-lnk">💬 Messages</a>
                <a href="/profile"              class="nav-lnk">👤 Profile</a>
                <a href="/settings"             class="nav-lnk">⚙️ Settings</a>
                <a href="/logout"               class="nav-out">🚪 Logout</a>
            </div>
        </div>
    </div>
</nav>
<div class="container mt-4 mb-5" style="max-width:700px;">
    <a href="/freelancer/browse" class="btn btn-sm btn-outline-secondary mb-3">← Back to Browse</a>
    <div class="card mb-4">
        <h4 class="fw-bold mb-2" th:text="${gig.title}"></h4>
        <span class="badge mb-3 d-inline-block" style="background:#EEF2FF;color:#6366F1;" th:text="${gig.category}"></span>
        <p class="text-muted" th:text="${gig.description}"></p>
        <div class="row mt-3">
            <div class="col-md-4">
                <div class="fw-600 text-muted small">BUDGET</div>
                <div class="fw-bold" style="font-size:18px;">₹<span th:text="${gig.budget}"></span></div>
            </div>
            <div class="col-md-4">
                <div class="fw-600 text-muted small">DEADLINE</div>
                <div class="fw-bold" th:text="${gig.deadlineDate}"></div>
            </div>
            <div class="col-md-4">
                <div class="fw-600 text-muted small">POSTED BY</div>
                <a th:href="@{/profile/{id}(id=${gig.postedBy.id})}"
                   th:text="${gig.postedBy.name}"
                   style="color:#6366F1;font-weight:600;text-decoration:none;"></a>
            </div>
        </div>
    </div>
    <div class="card">
        <h5 class="fw-bold mb-3">📨 Submit Your Bid</h5>
        <form th:action="@{/freelancer/gig/{id}/bid(id=${gig.id})}" method="post" th:object="${bid}">
            <div class="mb-3">
                <label class="form-label">Your Bid Amount (₹)</label>
                <input type="number" th:field="*{amount}" class="form-control" required placeholder="Enter your price"/>
            </div>
            <div class="mb-4">
                <label class="form-label">Your Proposal</label>
                <textarea th:field="*{proposal}" class="form-control" rows="5" required
                          placeholder="Explain your approach, timeline and why you're the best fit..."></textarea>
            </div>
            <button type="submit" class="btn-bid">Submit Bid 🚀</button>
        </form>
    </div>
</div>
</body>
</html>
