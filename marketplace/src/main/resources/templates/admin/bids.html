<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Bids</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/darkmode.css"/>
    <script src="/darkmode.js"></script>
    <style>
        body { background: #F1F5F9; font-family: 'Segoe UI', sans-serif; }
        .pro-nav { background: #1E293B; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 12px rgba(0,0,0,0.15); padding: 10px 0; }
        .nav-brand { color: white; font-weight: 700; font-size: 18px; text-decoration: none; }
        .nav-item-link { color: #94A3B8; text-decoration: none; padding: 7px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        .nav-item-link:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .nav-item-link.active { color: #fff; background: rgba(255,255,255,0.15); }
        .nav-logout { color: #FC8181; text-decoration: none; padding: 7px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; }
        .nav-logout:hover { background: rgba(252,129,129,0.1); }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    </style>
</head>
<body>
<nav class="pro-nav">
    <div class="container d-flex align-items-center justify-content-between">
        <a href="/admin/dashboard" class="nav-brand">🛡️ FreelanceHub Admin</a>
        <div class="d-flex align-items-center gap-1">
            <a href="/admin/dashboard" class="nav-item-link">📊 Dashboard</a>
            <a href="/admin/users"     class="nav-item-link">👥 Users</a>
            <a href="/admin/gigs"      class="nav-item-link">📋 Projects</a>
            <a href="/admin/bids"      class="nav-item-link active">📨 Bids</a>
            <a href="/settings"        class="nav-item-link">⚙️ Settings</a>
            <a href="/logout"          class="nav-logout">🚪 Logout</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h4 class="mb-3">📨 All Bids</h4>
    <div class="card p-3">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
            <tr><th>#</th><th>Project</th><th>Freelancer</th><th>Amount</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody>
            <tr th:each="bid, stat : ${bids}">
                <td th:text="${stat.count}"></td>
                <td th:text="${bid.gig.title}"></td>
                <td th:text="${bid.bidder.name}"></td>
                <td>₹<span th:text="${bid.amount}"></span></td>
                <td>
                    <span class="badge bg-warning text-dark" th:if="${bid.status.name() == 'PENDING'}">PENDING</span>
                    <span class="badge bg-success"           th:if="${bid.status.name() == 'ACCEPTED'}">ACCEPTED</span>
                    <span class="badge bg-danger"            th:if="${bid.status.name() == 'REJECTED'}">REJECTED</span>
                </td>
                <td>
                    <form th:action="@{/admin/bids/{id}/delete(id=${bid.id})}"
                          method="post" onsubmit="return confirm('Delete?')">
                        <button type="submit" class="btn btn-danger btn-sm">🗑</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
