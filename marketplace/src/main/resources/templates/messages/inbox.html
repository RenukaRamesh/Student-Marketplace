<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/darkmode.css"/>
    <script src="/darkmode.js"></script>
    <style>
        body { background: #F1F5F9; font-family: 'Segoe UI', sans-serif; }
        .pro-nav { background: #1E293B; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 12px rgba(0,0,0,0.15); padding: 10px 0; }
        .nav-brand { color: white; font-weight: 700; font-size: 18px; text-decoration: none; }
        .nav-item-link { color: #94A3B8; text-decoration: none; padding: 7px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        .nav-item-link:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .nav-item-link.active { color: #fff; background: rgba(255,255,255,0.15); }
        .nav-logout { color: #FC8181; text-decoration: none; padding: 7px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; }
        .nav-logout:hover { background: rgba(252,129,129,0.1); }
        .contact-item { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; text-decoration: none; color: inherit; display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: all 0.2s; }
        .contact-item:hover { background: #E8EFF7; transform: translateX(4px); }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #4A6F8A; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; flex-shrink: 0; }
    </style>
</head>
<body>
<nav class="pro-nav">
    <div class="container d-flex align-items-center justify-content-between">
        <a href="/dashboard" class="nav-brand">🎓 FreelanceHub</a>
        <div class="d-flex align-items-center gap-1">
            <a href="/dashboard" class="nav-item-link">🏠 Home</a>
            <a href="/messages"  class="nav-item-link active">💬 Messages</a>
            <a href="/profile"   class="nav-item-link">👤 Profile</a>
            <a href="/settings"  class="nav-item-link">⚙️ Settings</a>
            <a href="/logout"    class="nav-logout">🚪 Logout</a>
        </div>
    </div>
</nav>
<div class="container mt-4" style="max-width:680px;">
    <a href="/dashboard" class="btn btn-sm btn-outline-secondary mb-3">← Back</a>
    <h4 class="mb-4">💬 Messages</h4>
    <div th:if="${#sets.isEmpty(contacts)}"
         style="background:white;border-radius:12px;padding:40px;text-align:center;"
         class="text-muted">
        No conversations yet. Start from someone's profile!
    </div>
    <div th:each="contact : ${contacts}">
        <a th:href="@{/messages/{id}(id=${contact.id})}" class="contact-item">
            <div class="avatar" th:text="${#strings.substring(contact.name,0,1)}"></div>
            <div>
                <strong th:text="${contact.name}"></strong>
                <br/>
                <small class="text-muted" th:text="${contact.role}"></small>
            </div>
            <div class="ms-auto">
                <span class="badge" style="background:#E8EFF7;color:#4A6F8A;"
                      th:text="${contact.email}"></span>
            </div>
        </a>
    </div>
</div>
</body>
</html>
