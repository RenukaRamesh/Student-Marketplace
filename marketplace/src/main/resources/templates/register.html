<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>FreelanceHub — Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/darkmode.css"/>
    <script src="/darkmode.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: #F8FAFC; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card { background: white; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 540px; padding: 48px; }
        .card-header { text-align: center; margin-bottom: 36px; }
        .logo-wrap { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .logo-icon { width: 36px; height: 36px; background: #6366F1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .logo-name { font-size: 17px; font-weight: 700; color: #111827; }
        .card-title { font-size: 24px; font-weight: 800; color: #111827; margin-bottom: 6px; }
        .card-sub { font-size: 14px; color: #6B7280; }
        label.form-label { font-size: 12px; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.6px; display: block; margin-bottom: 6px; }
        input.form-input { width: 100%; border: 2px solid #E5E7EB; border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s; background: #F9FAFB; }
        input.form-input:focus { border-color: #6366F1; background: white; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .mb-field { margin-bottom: 18px; }
        .role-section { margin-bottom: 24px; }
        .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
        .role-option { border: 2px solid #E5E7EB; border-radius: 12px; padding: 18px; cursor: pointer; text-align: center; transition: all 0.2s; background: #F9FAFB; }
        .role-option:hover { border-color: #6366F1; background: #EEF2FF; }
        .role-option.selected { border-color: #6366F1; background: #EEF2FF; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .role-option input[type="radio"] { display: none; }
        .role-emoji { font-size: 28px; margin-bottom: 6px; }
        .role-name { font-size: 14px; font-weight: 700; color: #111827; }
        .role-hint { font-size: 12px; color: #6B7280; margin-top: 3px; }
        .role-error { color: #DC2626; font-size: 12px; margin-top: 6px; display: none; }
        .btn-create { width: 100%; background: #6366F1; color: white; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; }
        .btn-create:hover { background: #4F46E5; box-shadow: 0 6px 18px rgba(99,102,241,0.3); transform: translateY(-1px); }
        .bottom-text { text-align: center; font-size: 14px; color: #6B7280; margin-top: 20px; }
        .bottom-text a { color: #6366F1; font-weight: 600; text-decoration: none; }
        .alert-box { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
        .alert-error { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div class="logo-wrap">
            <div class="logo-icon">🎓</div>
            <div class="logo-name">FreelanceHub</div>
        </div>
        <div class="card-title">Create your account</div>
        <div class="card-sub">Join FreelanceHub and start collaborating</div>
    </div>

    <div th:if="${error}" class="alert-box alert-error" th:text="${error}"></div>

    <form th:action="@{/register}" method="post" th:object="${user}"
          onsubmit="return validate()">
        <div class="mb-field">
            <label class="form-label">Full Name</label>
            <input type="text" th:field="*{name}" class="form-input"
                   placeholder="Your full name" required/>
        </div>
        <div class="mb-field">
            <label class="form-label">Email Address</label>
            <input type="email" th:field="*{email}" class="form-input"
                   placeholder="you@example.com" required/>
        </div>
        <div class="mb-field">
            <label class="form-label">Password</label>
            <input type="password" th:field="*{password}" class="form-input"
                   placeholder="Minimum 6 characters" minlength="6" required/>
        </div>

        <div class="role-section">
            <label class="form-label">I want to</label>
            <div class="role-grid">
                <label class="role-option" onclick="pick('CLIENT', this)">
                    <input type="radio" name="role" value="CLIENT" id="rC"/>
                    <div class="role-emoji">💼</div>
                    <div class="role-name">Hire Talent</div>
                    <div class="role-hint">Post projects & hire freelancers</div>
                </label>
                <label class="role-option" onclick="pick('FREELANCER', this)">
                    <input type="radio" name="role" value="FREELANCER" id="rF"/>
                    <div class="role-emoji">🛠️</div>
                    <div class="role-name">Find Work</div>
                    <div class="role-hint">Bid on projects & build portfolio</div>
                </label>
            </div>
            <div class="role-error" id="roleErr">Please choose a role to continue.</div>
        </div>

        <button type="submit" class="btn-create">Create Account →</button>
    </form>

    <div class="bottom-text">
        Already have an account? <a href="/login">Sign in</a>
    </div>
</div>
<script>
    function pick(role, el) {
        document.querySelectorAll('.role-option').forEach(r => r.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById(role === 'CLIENT' ? 'rC' : 'rF').checked = true;
        document.getElementById('roleErr').style.display = 'none';
    }
    function validate() {
        if (!document.getElementById('rC').checked && !document.getElementById('rF').checked) {
            document.getElementById('roleErr').style.display = 'block';
            return false;
        }
        return true;
    }
</script>
</body>
</html>
