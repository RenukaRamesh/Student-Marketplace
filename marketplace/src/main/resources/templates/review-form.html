<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Leave a Review — FreelanceHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/darkmode.css"/>
    <script src="/darkmode.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #F0F4F8; }
        .pro-nav { background: #0F172A; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 16px rgba(0,0,0,0.2); }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .nav-brand { color: white; font-weight: 800; font-size: 18px; text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-lnk { color: #94A3B8; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; }
        .nav-lnk:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-out { color: #F87171; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; }
        .nav-out:hover { background: rgba(248,113,113,0.1); }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); background: white; padding: 32px; }
        .form-label { font-size: 12px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control, .form-select { border: 2px solid #E5E7EB; border-radius: 10px; padding: 11px 14px; font-size: 14px; background: #F9FAFB; }
        .form-control:focus, .form-select:focus { border-color: #F59E0B; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); background: white; }
        .btn-review { background: #F59E0B; border: none; color: white; border-radius: 10px; padding: 12px 28px; font-weight: 700; }
        .btn-review:hover { background: #D97706; color: white; }
    </style>
</head>
<body>
<nav class="pro-nav">
    <div class="container">
        <div class="nav-inner">
            <a href="/dashboard" class="nav-brand">🎓 FreelanceHub</a>
            <div class="nav-links">
                <a href="/dashboard" class="nav-lnk">🏠 Home</a>
                <a href="/messages"  class="nav-lnk">💬 Messages</a>
                <a href="/profile"   class="nav-lnk">👤 Profile</a>
                <a href="/settings"  class="nav-lnk">⚙️ Settings</a>
                <a href="/logout"    class="nav-out">🚪 Logout</a>
            </div>
        </div>
    </div>
</nav>
<div class="container mt-4 mb-5" style="max-width:580px;">
    <a href="/client/my-gigs" class="btn btn-sm btn-outline-secondary mb-3">← Back</a>
    <h4 class="fw-bold mb-1">⭐ Leave a Review</h4>
    <p class="text-muted mb-4">Reviewing: <strong th:text="${freelancer.name}"></strong></p>
    <div class="card">
        <form th:action="@{/review/{email}(email=${freelancer.email})}" method="post" th:object="${review}">
            <div class="mb-3">
                <label class="form-label">Rating</label>
                <select th:field="*{rating}" class="form-select" required>
                    <option value="5">⭐⭐⭐⭐⭐ — Excellent</option>
                    <option value="4">⭐⭐⭐⭐ — Good</option>
                    <option value="3">⭐⭐⭐ — Average</option>
                    <option value="2">⭐⭐ — Poor</option>
                    <option value="1">⭐ — Very Poor</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label">Comment</label>
                <textarea th:field="*{comment}" class="form-control" rows="4" placeholder="Share your experience working with this freelancer..."></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn-review">Submit Review ⭐</button>
                <a href="/client/my-gigs" class="btn btn-outline-secondary" style="border-radius:10px;">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
