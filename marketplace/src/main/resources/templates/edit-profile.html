<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Profile — FreelanceHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/darkmode.css"/>
    <script src="/darkmode.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #F0F4F8; }
        .pro-nav { background: #0F172A; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 16px rgba(0,0,0,0.2); }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .nav-brand { color: white; font-weight: 800; font-size: 18px; text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-lnk { color: #94A3B8; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; }
        .nav-lnk:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-out { color: #F87171; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; }
        .nav-out:hover { background: rgba(248,113,113,0.1); }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); background: white; padding: 32px; }
        .form-label { font-size: 12px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { border: 2px solid #E5E7EB; border-radius: 10px; padding: 11px 14px; font-size: 14px; background: #F9FAFB; }
        .form-control:focus { border-color: #6366F1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); background: white; }
        .btn-save { background: #6366F1; border: none; color: white; border-radius: 10px; padding: 11px 28px; font-weight: 700; }
        .btn-save:hover { background: #4F46E5; color: white; }
    </style>
</head>
<body>
<nav class="pro-nav">
    <div class="container">
        <div class="nav-inner">
            <a href="/dashboard" class="nav-brand">🎓 FreelanceHub</a>
            <div class="nav-links">
                <a href="/dashboard" class="nav-lnk">🏠 Home</a>
                <a href="/messages"  class="nav-lnk">💬 Messages</a>
                <a href="/profile"   class="nav-lnk">👤 Profile</a>
                <a href="/settings"  class="nav-lnk">⚙️ Settings</a>
                <a href="/logout"    class="nav-out">🚪 Logout</a>
            </div>
        </div>
    </div>
</nav>
<div class="container mt-4 mb-5" style="max-width:650px;">
    <a href="/profile" class="btn btn-sm btn-outline-secondary mb-3">← Back to Profile</a>
    <h4 class="fw-bold mb-4">✏️ Edit Profile</h4>
    <div class="card">
        <form th:action="@{/profile/edit}" method="post" th:object="${user}">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" th:field="*{name}" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label class="form-label">Bio</label>
                <textarea th:field="*{bio}" class="form-control" rows="3" placeholder="Tell others about yourself..."></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Skills <span style="text-transform:none;font-weight:400;color:#94A3B8;">(comma separated)</span></label>
                <input type="text" th:field="*{skills}" class="form-control" placeholder="Java, React, Figma, Python..."/>
            </div>
            <div class="mb-3">
                <label class="form-label">GitHub Profile URL</label>
                <input type="text" th:field="*{githubUrl}" class="form-control" placeholder="https://github.com/username"/>
            </div>
            <div class="mb-4">
                <label class="form-label">Top Projects</label>
                <textarea th:field="*{topProjects}" class="form-control" rows="4" placeholder="List your best projects, one per line..."></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn-save">Save Changes</button>
                <a href="/profile" class="btn btn-outline-secondary" style="border-radius:10px;">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
