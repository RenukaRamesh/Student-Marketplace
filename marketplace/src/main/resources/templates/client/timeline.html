<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Project Timeline — FreelanceHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/darkmode.css"/>
    <script src="/darkmode.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #F0F4F8; }
        .pro-nav { background: #0F172A; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 16px rgba(0,0,0,0.2); }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .nav-brand { color: white; font-weight: 800; font-size: 18px; text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-lnk { color: #94A3B8; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; transition: all 0.2s; }
        .nav-lnk:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-out { color: #F87171; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; }
        .nav-out:hover { background: rgba(248,113,113,0.1); }
        .timeline { position: relative; padding-left: 44px; }
        .timeline::before { content: ''; position: absolute; left: 18px; top: 0; bottom: 0; width: 3px; background: linear-gradient(to bottom,#6366F1,#E2E8F0); border-radius: 3px; }
        .tl-item { position: relative; margin-bottom: 28px; }
        .tl-dot { position: absolute; left: -33px; width: 18px; height: 18px; border-radius: 50%; border: 3px solid white; }
        .dot-open       { background: #6366F1; box-shadow: 0 0 0 3px #6366F1; }
        .dot-in_progress { background: #F59E0B; box-shadow: 0 0 0 3px #F59E0B; }
        .dot-completed  { background: #10B981; box-shadow: 0 0 0 3px #10B981; }
        .dot-closed     { background: #94A3B8; box-shadow: 0 0 0 3px #94A3B8; }
        .tl-card { background: white; border-radius: 14px; padding: 18px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    </style>
</head>
<body>
<nav class="pro-nav">
    <div class="container">
        <div class="nav-inner">
            <a href="/client/dashboard" class="nav-brand">🎓 FreelanceHub</a>
            <div class="nav-links">
                <a href="/client/dashboard" class="nav-lnk">🏠 Home</a>
                <a href="/messages"         class="nav-lnk">💬 Messages</a>
                <a href="/profile"          class="nav-lnk">👤 Profile</a>
                <a href="/settings"         class="nav-lnk">⚙️ Settings</a>
                <a href="/logout"           class="nav-out">🚪 Logout</a>
            </div>
        </div>
    </div>
</nav>
<div class="container mt-4 mb-5">
    <!-- ONLY ONE back button -->
    <a href="/client/dashboard" class="btn btn-sm btn-outline-secondary mb-3">← Back</a>
    <h4 class="fw-bold mb-4">🗓️ Project Timeline</h4>
    <div th:if="${#lists.isEmpty(gigs)}"
         style="background:white;border-radius:16px;padding:48px;text-align:center;"
         class="text-muted">
        <div style="font-size:48px;">🗓️</div>
        <h5 class="mt-3 fw-bold">No projects yet</h5>
        <a href="/client/post-gig" class="btn mt-2"
           style="background:#6366F1;color:white;border-radius:10px;">Post First Project</a>
    </div>
    <div class="timeline">
        <div class="tl-item" th:each="gig : ${gigs}">
            <div th:class="${'tl-dot dot-' + #strings.toLowerCase(gig.status.name())}"></div>
            <div class="tl-card">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                    <div>
                        <h6 class="fw-bold mb-1" th:text="${gig.title}"></h6>
                        <span class="badge"
                              style="background:#EEF2FF;color:#6366F1;font-size:11px;"
                              th:text="${gig.category}"></span>
                    </div>
                    <div>
                        <span class="badge bg-success"
                              th:if="${gig.status.name() == 'OPEN'}">OPEN</span>
                        <span class="badge bg-warning text-dark"
                              th:if="${gig.status.name() == 'IN_PROGRESS'}">🔧 IN PROGRESS</span>
                        <span class="badge"
                              style="background:#10B981;"
                              th:if="${gig.status.name() == 'COMPLETED'}">✅ COMPLETED</span>
                        <span class="badge bg-secondary"
                              th:if="${gig.status.name() == 'CLOSED'}">CLOSED</span>
                    </div>
                </div>
                <div class="d-flex gap-4 mt-2 text-muted" style="font-size:13px;">
                    <span>💰 ₹<span th:text="${gig.budget}"></span></span>
                    <span th:if="${gig.deadlineDate != null}">
                        📅 <span th:text="${gig.deadlineDate}"></span>
                        <span th:if="${gig.status.name() != 'COMPLETED'
                                  and gig.daysLeft >= 0 and gig.daysLeft <= 3}"
                              class="text-danger fw-bold"> ⚠️ Due Soon!</span>
                        <span th:if="${gig.status.name() != 'COMPLETED'
                                  and gig.daysLeft < 0}"
                              class="text-danger fw-bold"> ⛔ Overdue</span>
                        <span th:if="${gig.status.name() == 'COMPLETED'}"
                              class="text-success fw-bold"> ✅ Done</span>
                    </span>
                </div>
                <div class="mt-2">
                    <a th:href="@{/client/gig/{id}/bids(id=${gig.id})}"
                       class="btn btn-sm btn-outline-secondary"
                       style="border-radius:8px;">👁 View Bids</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
