<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Post a Project — FreelanceHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/darkmode.css"/>
    <script src="/darkmode.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #F0F4F8; }
        .pro-nav { background: #0F172A; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 16px rgba(0,0,0,0.2); }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .nav-brand { color: white; font-weight: 800; font-size: 18px; text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-lnk { color: #94A3B8; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; transition: all 0.2s; }
        .nav-lnk:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-out { color: #F87171; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; }
        .nav-out:hover { background: rgba(248,113,113,0.1); }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); background: white; padding: 32px; }
        .form-label { font-size: 12px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { border: 2px solid #E5E7EB; border-radius: 10px; padding: 11px 14px; font-size: 14px; background: #F9FAFB; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .form-control:focus { border-color: #6366F1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); background: white; }
        .cat-tag { border: 2px solid #E5E7EB; border-radius: 10px; padding: 10px 14px; cursor: pointer; font-size: 13px; transition: all 0.2s; display: inline-block; margin: 4px; background: #F9FAFB; }
        .cat-tag:hover { border-color: #6366F1; background: #EEF2FF; }
        .cat-tag.selected { border-color: #6366F1; background: #EEF2FF; color: #6366F1; font-weight: 600; }
        .cat-tag input { display: none; }
        .btn-submit { background: #6366F1; border: none; color: white; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; width: 100%; transition: all 0.2s; font-family: 'Inter', sans-serif; cursor: pointer; }
        .btn-submit:hover { background: #4F46E5; transform: translateY(-1px); }
        .ai-btn { background: linear-gradient(135deg,#667eea,#764ba2); border: none; color: white; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
        .ai-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .ai-loading { display: none; font-size: 13px; color: #764ba2; margin-top: 6px; font-weight: 500; }
    </style>
</head>
<body>
<nav class="pro-nav">
    <div class="container">
        <div class="nav-inner">
            <a href="/client/dashboard" class="nav-brand">🎓 FreelanceHub</a>
            <div class="nav-links">
                <a href="/client/dashboard" class="nav-lnk">🏠 Home</a>
                <a href="/messages"         class="nav-lnk">💬 Messages</a>
                <a href="/profile"          class="nav-lnk">👤 Profile</a>
                <a href="/settings"         class="nav-lnk">⚙️ Settings</a>
                <a href="/logout"           class="nav-out">🚪 Logout</a>
            </div>
        </div>
    </div>
</nav>
<div class="container mt-4 mb-5" style="max-width:700px;">
    <a href="/client/my-gigs" class="btn btn-sm btn-outline-secondary mb-3">← Back</a>
    <h4 class="fw-bold mb-1">📋 Post a New Project</h4>
    <p class="text-muted mb-4">Fill in the details to find the right freelancer</p>
    <div class="card">
        <form th:action="@{/client/post-gig}" method="post" th:object="${gig}">
            <div class="mb-4">
                <label class="form-label">Project Title *</label>
                <input type="text" th:field="*{title}" id="titleInput"
                       class="form-control" required
                       placeholder="e.g. Build a college event website"/>
            </div>
            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label mb-0">Description *</label>
                    <button type="button" class="ai-btn" id="aiBtn"
                            onclick="generateAiDescription()">✨ AI Generate</button>
                </div>
                <textarea th:field="*{description}" id="descInput"
                          class="form-control" rows="5" required
                          placeholder="Describe what you need, expected output, and requirements..."></textarea>
                <div class="ai-loading" id="aiLoading">✨ Generating description with AI...</div>
            </div>
            <div class="mb-4">
                <label class="form-label">Category *</label>
                <div>
                    <label class="cat-tag" onclick="selectCat(this)">
                        <input type="radio" name="category" value="Web Development" required/>🌐 Web Dev</label>
                    <label class="cat-tag" onclick="selectCat(this)">
                        <input type="radio" name="category" value="Mobile App"/>📱 Mobile App</label>
                    <label class="cat-tag" onclick="selectCat(this)">
                        <input type="radio" name="category" value="UI/UX Design"/>🎨 UI/UX Design</label>
                    <label class="cat-tag" onclick="selectCat(this)">
                        <input type="radio" name="category" value="Data Analysis"/>📊 Data Analysis</label>
                    <label class="cat-tag" onclick="selectCat(this)">
                        <input type="radio" name="category" value="Content Writing"/>✍️ Writing</label>
                    <label class="cat-tag" onclick="selectCat(this)">
                        <input type="radio" name="category" value="Video Editing"/>🎬 Video</label>
                    <label class="cat-tag" onclick="selectCat(this)">
                        <input type="radio" name="category" value="Other"/>💼 Other</label>
                </div>
            </div>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Budget (₹) *</label>
                    <input type="number" th:field="*{budget}" class="form-control"
                           required min="1" placeholder="e.g. 5000"/>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Deadline Date *</label>
                    <input type="date" th:field="*{deadlineDate}"
                           class="form-control" required/>
                </div>
            </div>
            <button type="submit" class="btn-submit">🚀 Post Project</button>
        </form>
    </div>
</div>
<script>
    function selectCat(label) {
        document.querySelectorAll('.cat-tag').forEach(t => t.classList.remove('selected'));
        label.classList.add('selected');
    }

    async function generateAiDescription() {
        const title = document.getElementById('titleInput').value.trim();
        if (!title) {
            alert('Please enter a project title first!');
            document.getElementById('titleInput').focus();
            return;
        }
        const btn     = document.getElementById('aiBtn');
        const loading = document.getElementById('aiLoading');
        const desc    = document.getElementById('descInput');

        btn.disabled    = true;
        btn.textContent = '⏳ Generating...';
        loading.style.display = 'block';
        desc.value = '';

        try {
            const res  = await fetch('/api/generate-description', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title })
            });

            if (!res.ok) {
                desc.value = 'Server error. Please type manually.';
            } else {
                const data = await res.json();
                desc.value = data.text || 'Could not generate. Please type manually.';
            }
        } catch (err) {
            desc.value = 'Connection error. Please type manually.';
        }

        btn.disabled    = false;
        btn.textContent = '✨ AI Generate';
        loading.style.display = 'none';
    }

    // Set min date to today
    const today = new Date().toISOString().split('T')[0];
    const dateInput = document.querySelector('input[type="date"]');
    if (dateInput) dateInput.min = today;
</script>
</body>
</html>
