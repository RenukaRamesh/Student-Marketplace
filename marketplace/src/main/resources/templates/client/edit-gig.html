<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Project — FreelanceHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/darkmode.css"/>
    <script src="/darkmode.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #F0F4F8; }
        .pro-nav { background: #0F172A; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 16px rgba(0,0,0,0.2); }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .nav-brand { color: white; font-weight: 800; font-size: 18px; text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-lnk { color: #94A3B8; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; }
        .nav-lnk:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-out { color: #F87171; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; }
        .nav-out:hover { background: rgba(248,113,113,0.1); }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); background: white; padding: 32px; }
        .form-label { font-size: 12px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { border: 2px solid #E5E7EB; border-radius: 10px; padding: 11px 14px; font-size: 14px; background: #F9FAFB; }
        .form-control:focus { border-color: #6366F1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); background: white; }
        .btn-save { background: #6366F1; border: none; color: white; border-radius: 10px; padding: 11px 28px; font-weight: 700; }
        .btn-save:hover { background: #4F46E5; color: white; }
    </style>
</head>
<body>
<nav class="pro-nav">
    <div class="container">
        <div class="nav-inner">
            <a href="/client/dashboard" class="nav-brand">🎓 FreelanceHub</a>
            <div class="nav-links">
                <a href="/client/dashboard" class="nav-lnk">🏠 Home</a>
                <a href="/messages"         class="nav-lnk">💬 Messages</a>
                <a href="/profile"          class="nav-lnk">👤 Profile</a>
                <a href="/settings"         class="nav-lnk">⚙️ Settings</a>
                <a href="/logout"           class="nav-out">🚪 Logout</a>
            </div>
        </div>
    </div>
</nav>
<div class="container mt-4 mb-5" style="max-width:680px;">
    <a href="/client/my-gigs" class="btn btn-sm btn-outline-secondary mb-3">← Back</a>
    <h4 class="fw-bold mb-4">✏️ Edit Project</h4>
    <div class="card">
        <form th:action="@{/client/gig/{id}/edit(id=${gig.id})}" method="post" th:object="${gig}">
            <div class="mb-3">
                <label class="form-label">Project Title</label>
                <input type="text" th:field="*{title}" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea th:field="*{description}" class="form-control" rows="4" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <input type="text" th:field="*{category}" class="form-control"/>
            </div>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Budget (₹)</label>
                    <input type="number" th:field="*{budget}" class="form-control" required/>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Deadline</label>
                    <input type="date" th:field="*{deadlineDate}" class="form-control"/>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn-save">Save Changes</button>
                <a href="/client/my-gigs" class="btn btn-outline-secondary" style="border-radius:10px;">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
